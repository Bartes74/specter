name: Verify tutorials

# Wymaganie 16.11 — automatyczna weryfikacja tutoriali co 30 dni.
# Otwiera PR z aktualizacjami gdy treść zmieniła się lub źródło stało się nieosiągalne.

on:
  schedule:
    # 5. dnia każdego miesiąca o 03:00 UTC
    - cron: '0 3 5 * *'
  workflow_dispatch:
    inputs:
      provider:
        description: 'Verify only this provider (openai|anthropic|google|github), or empty for all'
        required: false
        type: string

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run verification
        id: verify
        run: |
          if [ -n "${{ github.event.inputs.provider }}" ]; then
            npm run tutorials:verify -- ${{ github.event.inputs.provider }}
          else
            npm run tutorials:verify
          fi

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open Pull Request with updates
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(tutorials): refresh verifiedAgainstDocsAt + content hashes'
          branch: chore/tutorials-refresh
          delete-branch: true
          title: 'Tutorials refresh — automated verification'
          body: |
            Automated tutorial verification ran successfully.

            ## What changed
            - Updated `verifiedAgainstDocsAt` for all reachable providers
            - Updated `contentHash` where local markdown was modified

            ## Manual review needed
            - Verify that no provider returned `source_unreachable` (would have failed CI)
            - Spot-check that content matches current provider docs

            ## Schedule
            This PR was created by the monthly verify-tutorials workflow (`.github/workflows/verify-tutorials.yml`).
          labels: |
            tutorials
            automated
